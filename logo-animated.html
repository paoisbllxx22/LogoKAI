<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LogoKAI — Animated</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d0d;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      font-family: system-ui, sans-serif;
    }

    .stage {
      width: min(92vw, 820px);
      filter: drop-shadow(0 32px 80px rgba(0, 0, 0, 0.9))
              drop-shadow(0 0 120px rgba(211, 23, 28, 0.04));
    }

    svg {
      width: 100%;
      height: auto;
      display: block;
      overflow: visible;
    }

    .replay-btn {
      background: none;
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.45);
      padding: 9px 22px;
      border-radius: 100px;
      cursor: pointer;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: border-color 0.25s, color 0.25s, background 0.25s;
      user-select: none;
    }
    .replay-btn:hover {
      border-color: #D3171C;
      color: #D3171C;
      background: rgba(211, 23, 28, 0.07);
    }
    .replay-btn:active {
      transform: scale(0.97);
    }

    /* ─── Custom easing curves ──────────────────────── */
    :root {
      --spring:   cubic-bezier(0.16, 1, 0.3, 1);
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
      --snap:     cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* ─── Keyframes ─────────────────────────────────── */

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* Marca principal — entrada elástica con rebote */
    @keyframes scaleInBounce {
      0%   { opacity: 0; transform: scale(0.15); }
      55%  { opacity: 1; transform: scale(1.10); }
      72%  { transform: scale(0.94); }
      88%  { transform: scale(1.04); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* Escala limpia */
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.4); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* Barra izquierda — cae desde arriba */
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-55px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Barra derecha — sube desde abajo */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(55px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Brazos K — desde la izquierda */
    @keyframes slideLeft {
      from { opacity: 0; transform: translateX(-65px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* Cuerpo de letras — sube suavemente con escala */
    @keyframes fadeRise {
      from { opacity: 0; transform: translateY(18px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0)   scale(1);    }
    }

    /* Barrido de luz premium — pasa una vez al finalizar la revelación */
    @keyframes shimmer {
      from { transform: translateX(-110%); opacity: 0.6; }
      60%  { opacity: 0.6; }
      to   { transform: translateX(110%);  opacity: 0; }
    }

    /* Pulso de resplandor rojo — loop continuo post-revelación */
    @keyframes redPulse {
      0%, 100% {
        filter: drop-shadow(0 0  0px rgba(211, 23, 28, 0));
      }
      50% {
        filter: drop-shadow(0 0  7px rgba(211, 23, 28, 0.65))
                drop-shadow(0 0 24px rgba(211, 23, 28, 0.28));
      }
    }

    /* Respiración sutil del logo completo */
    @keyframes breathe {
      0%, 100% { transform: scale(1);     filter: drop-shadow(0 32px 80px rgba(0,0,0,0.9)) drop-shadow(0 0 80px  rgba(211,23,28,0.03)); }
      50%       { transform: scale(1.003); filter: drop-shadow(0 36px 90px rgba(0,0,0,0.9)) drop-shadow(0 0 120px rgba(211,23,28,0.07)); }
    }

    /* ─── Asignación de animaciones por elemento ─────── */

    /* Fondo */
    #bg-outer    { animation: fadeIn 0.4s ease both; }
    #bg-inner    { animation: fadeIn 0.5s ease 50ms  both; }
    #border-path { animation: fadeIn 0.5s ease 100ms both; }

    /* 1 — Diamante rojo: lidera la revelación, rebote característico */
    #diamond-outer {
      transform-box: fill-box;
      transform-origin: center;
      animation:
        scaleInBounce 0.85s var(--spring)   200ms both,
        redPulse      4.5s  ease-in-out    2700ms infinite;
    }

    /* 2 — Detalle interior del diamante: entra suavemente justo después */
    #diamond-inner {
      transform-box: fill-box;
      transform-origin: center;
      animation: scaleIn 0.55s var(--spring) 430ms both;
    }

    /* 3 — Barra vertical izquierda: cae como un sello */
    #bar-left {
      transform-box: fill-box;
      transform-origin: top center;
      animation:
        slideDown 0.55s var(--ease-out)  590ms both,
        redPulse  4.5s  ease-in-out     2900ms infinite;
    }

    /* 4 — Brazos diagonales K: barren desde la izquierda */
    #k-arms {
      transform-box: fill-box;
      transform-origin: left center;
      animation:
        slideLeft 0.65s var(--ease-out)  740ms both,
        redPulse  4.5s  ease-in-out     3100ms infinite;
    }

    /* 5 — Cuerpo principal / formas de letras: emerge desde abajo */
    #main-body {
      transform-box: fill-box;
      transform-origin: center;
      animation: fadeRise 0.85s var(--spring) 890ms both;
    }

    /* 6 — Barra vertical derecha: sube como cierre */
    #bar-right {
      transform-box: fill-box;
      transform-origin: bottom center;
      animation: slideUp 0.55s var(--ease-out) 1100ms both;
    }

    /* Shimmer de luz: barre el logo una vez al terminar la revelación */
    #shimmer-rect {
      animation: shimmer 1.1s var(--ease-out) 1800ms 1 both;
      pointer-events: none;
    }

    /* Respiración del stage — arranca después del reveal completo */
    .stage {
      animation: breathe 7s ease-in-out 3.2s infinite;
    }

  </style>
</head>
<body>

           284.893C714.574 319.765 689.434 356.026 664.349 391.217L629.599

      <!-- Diamante exterior — marca principal (rojo) -->

        d="M264.066 205C264.879 205.004 265.895 205.081 266.643 205.419C268.879

           325.85C278.412 329.913 270.231 339.391 265.187 340.679C259.83 339.456
           248.26 326.411 244 321.862C258.297 306.63 276.779 289.559 291.892
           274.343C281.816 262.99 268.998 251.648 258.524 240.505C255.077 236.837

      <path id="diamond-inner"

      <!-- Barrido de luz premium (shimmer) -->
      <g clip-path="url(#logo-clip)">
        <rect id="shimmer-rect"
              x="-1188" y="0" width="1188" height="683"
              fill="url(#shimmer-grad)"/>
      </g>

    </svg>
  </div>

  <button class="replay-btn" onclick="replay()">↺ &nbsp;Reproducir animación</button>

  <script>
    const ANIMATED_IDS = [
      'bg-outer', 'bg-inner', 'border-path',
      'diamond-outer', 'diamond-inner',
      'bar-left', 'k-arms', 'main-body', 'bar-right',
      'shimmer-rect'
    ];

    function replay() {
      // Quitar animaciones para forzar reinicio
      ANIMATED_IDS.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.animation = 'none';
      });

      // El stage también
      const stage = document.querySelector('.stage');
      stage.style.animation = 'none';

      // Forzar reflow — procesa todos los cambios de estilo
      void document.querySelector('#logo-svg').getBoundingClientRect();

      // Restaurar: las animaciones CSS definidas arrancan de cero
      ANIMATED_IDS.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.animation = '';
      });
      stage.style.animation = '';
    }
  </script>

</body>
</html>
