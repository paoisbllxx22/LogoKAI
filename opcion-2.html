<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LogoKAI — Opción 2</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: radial-gradient(ellipse 90% 70% at 50% 50%, #121212 0%, #040404 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      font-family: system-ui, sans-serif;
    }

    .stage {
      width: min(92vw, 820px);
      filter: drop-shadow(0 40px 110px rgba(0,0,0,0.97));
    }

    svg {
      width: 100%;
      height: auto;
      display: block;
      overflow: visible;
    }

    /* Prevent FOUC — JS will reveal each path */
    .logo-path { fill-opacity: 0; }

    /* ─── Post-reveal: ember glow en rojo, loop continuo ─── */
    @keyframes ember {
      0%, 100% {
        filter: drop-shadow(0 0  0px rgba(211,  23,  28, 0   ));
      }
      40% {
        filter: drop-shadow(0 0  6px rgba(255,  55,  55, 0.75))
                drop-shadow(0 0 20px rgba(211,  23,  28, 0.45));
      }
      70% {
        filter: drop-shadow(0 0 10px rgba(255,  80,  80, 0.9 ))
                drop-shadow(0 0 32px rgba(211,  23,  28, 0.55));
      }
    }

    /* ─── Post-reveal: reflejo diagonal en loop ─── */
    @keyframes sweep {
      0%   { transform: translateX(-185%) skewX(-13deg); opacity: 0; }
      4%   { opacity: 1; }
      18%  { opacity: 1; }
      24%  { transform: translateX(185%)  skewX(-13deg); opacity: 0; }
      100% { transform: translateX(185%)  skewX(-13deg); opacity: 0; }
    }

    /* ─── Parpadeo rápido al finalizar (power surge) ─── */
    @keyframes surge {
      0%   { opacity: 1; }
      15%  { opacity: 0.15; }
      30%  { opacity: 1; }
      45%  { opacity: 0.4; }
      60%  { opacity: 1; }
      75%  { opacity: 0.7; }
      100% { opacity: 1; }
    }

    .do-ember {
      animation: ember 2.5s ease-in-out infinite;
    }
    .do-surge {
      animation: surge 0.32s ease-in-out forwards;
    }

    #shimmer-overlay { opacity: 0; pointer-events: none; }
    #shimmer-overlay.do-sweep {
      opacity: 1;
      animation: sweep 9s ease-in-out 1s infinite;
    }

    /* ─── Botón replay ─── */
    .replay-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.38);
      padding: 9px 22px;
      border-radius: 100px;
      cursor: pointer;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: border-color .25s, color .25s, background .25s;
      user-select: none;
    }
    .replay-btn:hover {
      border-color: #D3171C;
      color: #D3171C;
      background: rgba(211,23,28,0.07);
    }
    .replay-btn:active { transform: scale(0.97); }
  </style>
</head>
<body>

          <feGaussianBlur stdDeviation="8"  result="b2"/>
          <feMerge>
            <feMergeNode in="b2"/>
            <feMergeNode in="b1"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>

        <!-- Glow intenso para trazos rojos -->
        <filter id="glow-r" x="-80%" y="-80%" width="260%" height="260%">
          <feGaussianBlur stdDeviation="4"  result="b1"/>
          <feGaussianBlur stdDeviation="14" result="b2"/>
          <feMerge>
            <feMergeNode in="b2"/>
            <feMergeNode in="b2"/>
            <feMergeNode in="b1"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>

        <!-- Gradiente del reflejo diagonal post-reveal -->
        <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">

          <stop offset="40%"  stop-color="white" stop-opacity="0.05"/>
          <stop offset="50%"  stop-color="white" stop-opacity="0.13"/>
          <stop offset="60%"  stop-color="white" stop-opacity="0.05"/>
          <stop offset="100%" stop-color="white" stop-opacity="0"/>
        </linearGradient>

        <clipPath id="lc"><rect width="1188" height="683"/></clipPath>
      </defs>

      <!-- Reflejo diagonal post-reveal -->
      <g clip-path="url(#lc)">
        <rect id="shimmer-overlay"
              x="-1188" y="-300" width="1500" height="1400"
              fill="url(#sg)"/>
      </g>

    </svg>
  </div>

  <button class="replay-btn" onclick="startAnimation()">↺ &nbsp;Reproducir animación</button>

  <script>
    /*
     * Secuencia: [id, inicioTrazo_ms, durTrazo_ms, inicioRelleno_ms]
     * Concepto: Laser Etch — cada forma se "dibuja" con un trazo luminoso,
     * luego aparece el relleno mientras el trazo se desvanece.
     * Rojo = trazo rojo intenso | Oscuro = trazo blanco/plata
     */
    const SEQ = [
      ['diamond-outer', 280,  980, 1080],
      ['diamond-inner', 1060, 740, 1620],
      ['bar-left',      1540, 740, 2110],
      ['k-arms',        2070, 860, 2730],
      ['main-body',     2680, 1080, 3590],
      ['bar-right',     3490, 740, 4070],
    ];

    const SURGE_AT  = 4350; // Parpadeo de power surge
    const LOOP_AT   = 4700; // Inicio de animaciones en loop

    let timers = [];

    function reset() {
      timers.forEach(clearTimeout);
      timers = [];

      const shimmer = document.getElementById('shimmer-overlay');
      shimmer.classList.remove('do-sweep');

      document.querySelectorAll('.logo-path').forEach(p => {
        const len = p._len;
        p.style.cssText = `
          transition: none;
          stroke:           ${p.dataset.s};
          stroke-width:     2.5;
          stroke-opacity:   0;
          stroke-dasharray: ${len} ${len};
          stroke-dashoffset:${len};
          fill-opacity:     0;
          animation:        none;
        `;
        p.classList.remove('do-ember', 'do-surge');
      });
    }

    function t(fn, ms) {
      timers.push(setTimeout(fn, ms));
    }

    function startAnimation() {
      reset();
      void document.getElementById('logo-svg').getBoundingClientRect();

      SEQ.forEach(([id, sStart, sDur, fStart]) => {
        const p = document.getElementById(id);

        /* 1. Aparece el trazo (flash rápido) */
        t(() => {
          p.style.transition   = 'stroke-opacity 100ms ease';
          p.style.strokeOpacity = '1';
          p.style.filter        = `url(#${p.dataset.g})`;

          /* 2. Comienza el dibujo del trayecto */
          setTimeout(() => {
            p.style.transition =
              `stroke-dashoffset ${sDur}ms cubic-bezier(0.42, 0, 0.58, 1)`;
            p.style.strokeDashoffset = '0';
          }, 90);
        }, sStart);

        /* 3. Relleno aparece + trazo desaparece */
        t(() => {
          p.style.transition =
            'fill-opacity 520ms ease, stroke-opacity 360ms ease, filter 360ms ease';
          p.style.fillOpacity   = '1';
          p.style.strokeOpacity = '0';
          p.style.filter        = 'none';
        }, fStart);
      });

      /* 4. Power surge — parpadeo rápido de todos los elementos */
      t(() => {
        document.querySelectorAll('.logo-path').forEach(p => {
          p.style.animation = '';
          p.classList.add('do-surge');
        });
      }, SURGE_AT);

      /* 5. Loop: ember en rojos + reflejo diagonal */
      t(() => {
        document.querySelectorAll('.logo-path.is-red').forEach((p, i) => {
          setTimeout(() => {
            p.style.animation = '';
            p.classList.remove('do-surge');
            p.classList.add('do-ember');
          }, i * 220);
        });
        document.querySelectorAll('.logo-path:not(.is-red)').forEach(p => {
          p.classList.remove('do-surge');
        });
        document.getElementById('shimmer-overlay').classList.add('do-sweep');
      }, LOOP_AT);
    }

    /* Inicialización: mide longitudes y arranca */
    window.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.logo-path').forEach(p => {
        p._len = p.getTotalLength();
      });
      reset();
      void document.getElementById('logo-svg').getBoundingClientRect();
      setTimeout(startAnimation, 250);
    });
  </script>

</body>
</html>
